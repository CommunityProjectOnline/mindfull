<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MindFull - Your Inner Space</title>

        <!-- Favicon -->
        <link rel="icon" href="./favicon.svg" type="image/svg+xml">

        <!-- Link to external CSS -->
        <link rel="stylesheet" href="css/base.css">
        <link rel="stylesheet" href="css/navbar.css">
        <link rel="stylesheet" href="css/sidebar.css">
        <link rel="stylesheet" href="css/constellation.css">
        <link rel="stylesheet" href="css/modal.css">
        <link rel="stylesheet" href="css/audio.css">
        <link rel="stylesheet" href="css/astronaut.css">
        <link rel="stylesheet" href="css/settings.css">
    </head>

    <body>

        <!-- Top Navbar -->
        <nav id="topNavbar" class="top-navbar">
            <div class="navbar-brand">
                <img src="assets/logo-constellation.svg" alt="MindFull Logo" class="navbar-logo">
                <span class="navbar-title">MindFull</span>
            </div>
            <button id="addThoughtBtn" class="add-thought-btn-navbar">
                <svg viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                    <line x1="12" y1="8" x2="12" y2="16" stroke="currentColor" stroke-width="2"/>
                    <line x1="8" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="2"/>
                </svg>
                <span>Add Thought</span>
            </button>
        </nav>

        <!-- Collapsible Sidebar Navigation -->
        <div id="sidebar" class="sidebar">
            <!-- Sidebar Navigation Items -->
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" id="navInnerSpace" title="Inner Space">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                        <!-- Galaxy spiral icon -->
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
                        <path d="M12 2 Q16 6 16 12 Q16 18 12 22" stroke="currentColor" stroke-width="1.5" fill="none"/>
                        <path d="M22 12 Q18 8 12 8 Q6 8 2 12" stroke="currentColor" stroke-width="1.5" fill="none"/>
                        <circle cx="12" cy="12" r="2" fill="currentColor"/>
                        <circle cx="16" cy="8" r="1" fill="currentColor"/>
                        <circle cx="8" cy="16" r="1" fill="currentColor"/>
                        <circle cx="16" cy="16" r="0.5" fill="currentColor"/>
                        <circle cx="8" cy="8" r="0.5" fill="currentColor"/>
                    </svg>
                    <span class="nav-text">Inner Space</span>
                </a>

                <a href="#" class="nav-item" id="navMemories" title="Memories">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                        <!-- Store/Book icon -->
                        <path d="M4 6h16M4 6v12a2 2 0 002 2h12a2 2 0 002-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2" stroke="currentColor" stroke-width="2"/>
                        <line x1="12" y1="11" x2="12" y2="17" stroke="currentColor" stroke-width="2"/>
                        <line x1="9" y1="14" x2="15" y2="14" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <span class="nav-text">Memories</span>
                </a>

                <a href="#" class="nav-item" id="navTimeline" title="Timeline">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                        <path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <span class="nav-text">Timeline</span>
                </a>

                <a href="#" class="nav-item" id="navConstellations" title="Constellations">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                        <!-- Constellation pattern icon -->
                        <circle cx="6" cy="6" r="1.5" fill="currentColor"/>
                        <circle cx="18" cy="6" r="1.5" fill="currentColor"/>
                        <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
                        <circle cx="6" cy="18" r="1.5" fill="currentColor"/>
                        <circle cx="18" cy="18" r="1.5" fill="currentColor"/>
                        <line x1="6" y1="6" x2="12" y2="12" stroke="currentColor" stroke-width="1.5"/>
                        <line x1="18" y1="6" x2="12" y2="12" stroke="currentColor" stroke-width="1.5"/>
                        <line x1="12" y1="12" x2="6" y2="18" stroke="currentColor" stroke-width="1.5"/>
                        <line x1="12" y1="12" x2="18" y2="18" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                    <span class="nav-text">Constellations</span>
                </a>

                <a href="#" class="nav-item" id="navForgotten" title="Forgotten Memories">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" stroke-dasharray="2,2"/>
                        <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1" opacity="0.3"/>
                    </svg>
                    <span class="nav-text">Forgotten Memories</span>
                </a>
            </nav>

            <!-- Settings at bottom -->
            <nav class="sidebar-nav-bottom">
                <a href="#" class="nav-item" id="navSettings" title="Settings">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                        <path d="M12 1v6m0 6v10M1 12h6m6 0h10" stroke="currentColor" stroke-width="2"/>
                        <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
                    </svg>
                    <span class="nav-text">Settings</span>
                </a>
            </nav>
        </div>


        <!-- Add / Edit Thought Modal -->
        <div id="addThoughtModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="thoughtModalTitle">✨ Create New Thought</h2>
                    <button id="closeThoughtModal" class="close-btn">×</button>
                </div>
                <form id="addThoughtForm" class="thought-form">
                    <div class="form-group">
                        <label for="thoughtTitle">Title</label>
                        <input type="text" id="thoughtTitle" placeholder="e.g., John 3:16" required>
                    </div>
                    <div class="form-group">
                        <label for="thoughtCategory">Category</label>
                        <select id="thoughtCategory" required>
                            <option value="">Select a category...</option>
                            <option value="Scripture">📖 Scripture</option>
                            <option value="Note">📝 Note</option>
                            <option value="Prayer">🙏 Prayer</option>
                            <option value="Recipe">🍳 Recipe</option>
                            <option value="Quote">💭 Quote</option>
                            <option value="Idea">💡 Idea</option>
                            <option value="Goal">🎯 Goal</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="thoughtShortcut">Shortcut</label>
                        <input type="text" id="thoughtShortcut" placeholder="e.g., jn3:16">
                        <small>Optional. A unique handle to reference this Thought, e.g. {{jn3:16}}</small>
                    </div>
                    <div class="form-group">
                        <label for="thoughtContent">Content</label>
                        <textarea id="thoughtContent" rows="6" placeholder="Write your Thought here..."></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" id="cancelThoughtBtn" class="btn-secondary">Cancel</button>
                        <button type="submit" id="thoughtSubmitBtn" class="btn-primary">Create Thought</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Astronaut Mascot -->
        <div id="astronaut" class="astronaut-container">
            <img src="assets/astronaut_chibi2.png" alt="Astronaut Mascot" class="astronaut-mascot">
        </div>

        <!-- Settings Panel -->
        <div id="settingsPanel" class="settings-panel hidden">
            <div class="settings-header">
                <h2>Settings</h2>
                <button id="closeSettings" class="close-btn">×</button>
            </div>
            <div class="settings-content">
                <div class="settings-section">
                    <h3>Audio Controls</h3>
                    <div class="audio-controls">
                        <div class="control-row">
                            <label>Volume</label>
                            <input type="range" id="volumeSlider" min="0" max="100" value="30">
                            <span id="volumeValue">30%</span>
                        </div>
                        <div class="control-row">
                            <label>Now Playing</label>
                            <div class="track-info">
                                <span id="currentTrackDisplay">No track playing</span>
                            </div>
                        </div>
                        <div class="control-row">
                            <label>Track Controls</label>
                            <div class="track-controls">
                                <button id="prevTrack" class="track-btn">⏮ Previous</button>
                                <button id="nextTrack" class="track-btn">Next ⏭</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Inner Space - Grid workspace for floating Memories -->
        <div id="constellation" class="constellation">

            <!-- SVG Layer for String connections -->
            <svg id="connectionLayer" class="connection-layer">
                <defs>
                    <!-- Pulsing gradient definition -->
                    <linearGradient id="pulseGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="rgba(102, 126, 234, 0)" />
                        <stop offset="20%" stop-color="rgba(102, 126, 234, 0.4)" />
                        <stop offset="40%" stop-color="rgba(102, 126, 234, 0.8)" />
                        <stop offset="50%" stop-color="rgba(255, 255, 255, 1)" />
                        <stop offset="60%" stop-color="rgba(102, 126, 234, 0.8)" />
                        <stop offset="80%" stop-color="rgba(102, 126, 234, 0.4)" />
                        <stop offset="100%" stop-color="rgba(102, 126, 234, 0)" />

                        <!-- Animate the gradient along the line -->
                        <animate attributeName="x1" values="-50%;150%" dur="2s" repeatCount="indefinite" />
                        <animate attributeName="x2" values="50%;250%" dur="2s" repeatCount="indefinite" />
                    </linearGradient>
                </defs>
            </svg>

            <!-- Thought nodes are rendered here from the database by thought-manager.js -->

        </div>

        <!-- Audio Mute Button -->
        <button id="muteBtn" class="mute-btn" title="Mute">🔊</button>

        <!-- Now Playing Display -->
        <div id="nowPlaying" class="now-playing">
            <span id="trackName"></span>
        </div>

        <!-- JavaScript -->
        <!-- Configuration -->
        <script src="js/config.js"></script>

        <!-- API & Audio -->
        <script src="js/api.js"></script>
        <script src="js/audio.js"></script>

        <!-- State Management -->
        <script src="js/state/app-state.js"></script>

        <!-- Canvas Modules -->
        <script src="js/canvas/panning.js"></script>
        <script src="js/canvas/dragging.js"></script>

        <!-- Connection Modules -->
        <script src="js/connections/connection-manager.js"></script>
        <script src="js/connections/connection-animator.js"></script>

        <!-- UI Modules -->
        <script src="js/ui/astronaut-controller.js"></script>
        <script src="js/ui/navigation.js"></script>

        <!-- Thought Management -->
        <script src="js/thought-manager.js"></script>

        <!-- Application Initialization (loads last) -->
        <script src="js/app-init.js"></script>

    </body>
</html>
